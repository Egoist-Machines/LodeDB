[package]
name = "turbovec-python"
version = "0.8.0"
edition = "2021"
rust-version = "1.70"

[lib]
name = "_turbovec"
crate-type = ["cdylib"]

[dependencies]
lodedb-core = { path = "../../../crates/lodedb-core" }
# The managed-cloud transfer plane, exposed as the `cloud` submodule of the
# bundled extension (see src/cloud.rs). Compiled in unconditionally: pip extras
# can only add other distributions, never gate compiled contents, and the
# [cloud] extra's Python client needs these ops without a second wheel.
lodedb-cloud-core = { path = "../../../crates/lodedb-cloud-core" }
turbovec-core = { package = "turbovec", path = "../turbovec" }
pyo3 = { version = "0.27.0", features = ["extension-module", "abi3-py39"] }
numpy = "0.27.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

[build-dependencies]
pyo3-build-config = "0.27.0"
