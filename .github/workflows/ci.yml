name: ci

# Builds the vendored TurboVec crate from source and runs the lean local suite on
# the platforms LodeDB targets.
# The crate links a CBLAS provider — OpenBLAS on Linux, the Accelerate framework
# on macOS. Windows falls through to TurboVec's pure-Rust matrixmultiply path.

on:
  push:
    branches: [main]
  pull_request: {}
  workflow_dispatch: {}

permissions:
  contents: read

# Building the vendored TurboVec crate fetches its dependencies from crates.io.
# On the Windows runner those fetches intermittently fail with
# "[56] schannel: server closed abruptly (missing close_notify)", a known TLS flake
# aggravated by HTTP/2 multiplexing. Disable multiplexing (the trigger) and retry
# more on transient network errors. Harmless on Linux/macOS.
env:
  CARGO_NET_RETRY: "10"
  CARGO_HTTP_MULTIPLEXING: "false"

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install OpenBLAS (Linux CBLAS provider for the vendored TurboVec crate)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libopenblas-dev

      - uses: dtolnay/rust-toolchain@stable
      - uses: astral-sh/setup-uv@v5

      - name: Sync (base runtime + dev/embeddings/torch/mcp/langchain/llama-index/mem0/image extras)
        run: uv sync --extra dev --extra embeddings --extra torch --extra mcp --extra langchain --extra llama-index --extra mem0 --extra image

      - name: Lint
        run: uv run ruff check .

      - name: Base runtime contract
        shell: bash
        run: |
          uv run python - <<'PY'
          import importlib.util
          import sys

          import lodedb

          loaded = {name.split(".", 1)[0] for name in sys.modules}
          eager_forbidden = {
              "onnxruntime",
              "transformers",
              "sentence_transformers",
              "torch",
              "sklearn",
              "faiss",
              "modal",
              "mteb",
              "datasets",
              "matplotlib",
          }
          eager = sorted(loaded & eager_forbidden)
          if eager:
              raise SystemExit(f"import lodedb eagerly loaded heavy runtime modules: {eager}")

          # Base = vector store only (numpy/typer/pyyaml); the embedding runtimes are the opt-in
          # [embeddings]/[torch] extras, exercised by the test suite rather than asserted here.
          required = {
              "numpy": "numpy",
              "typer": "typer",
              "pyyaml": "yaml",
          }
          missing = [name for name, module in required.items() if importlib.util.find_spec(module) is None]
          if missing:
              raise SystemExit(f"missing base runtime dependencies: {missing}")

          assert lodedb.__version__
          PY

      - name: Test
        run: uv run pytest -q

  # Runs the native Rust core's own test suites (the integration suites in
  # crates/lodedb-core/tests plus the lodedb-ffi ABI smoke), which the Python
  # pytest job above does not exercise. Linux only; the vendored TurboVec crate
  # needs a CBLAS provider (OpenBLAS) to build here.
  rust-tests:
    name: native-core rust tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install OpenBLAS (Linux CBLAS provider for the vendored TurboVec crate)
        run: sudo apt-get update && sudo apt-get install -y libopenblas-dev

      - uses: dtolnay/rust-toolchain@stable

      - name: Run the native-core Rust test suites
        run: cargo test --workspace

  # Builds the LodeDBCoreFFI XCFramework (host slice) and runs the Swift binding's
  # build + test against the statically-linked native core. This gates the Swift/iOS
  # binding on every PR; previously the XCFramework was only built on release.
  swift-binding:
    name: swift binding (macOS)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      # The Swift tests use the swift-testing framework (`import Testing`), which ships
      # with the Swift 6 toolchain (Xcode 16+); pin the latest stable Xcode so the
      # runner's default (which can be older) does not break `swift test`.
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - name: Toolchain
        run: swift --version

      - uses: dtolnay/rust-toolchain@stable

      - name: Build the LodeDBCoreFFI XCFramework (host slice)
        run: bash swift/LodeDBCore/scripts/package_xcframework.sh

      - name: Swift build + test against the native core
        run: swift test --package-path swift/LodeDBCore

  # Builds the package in a clean environment and asserts the *patched* TurboVec core is
  # what got built — not the stock PyPI `turbovec`, which lacks the delta-persistence and
  # reconstruction APIs. This is the guard for the vendored-dependency install story.
  smoke:
    name: patched-core smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install OpenBLAS (Linux CBLAS provider for the vendored TurboVec crate)
        run: sudo apt-get update && sudo apt-get install -y libopenblas-dev

      - uses: dtolnay/rust-toolchain@stable
      - uses: astral-sh/setup-uv@v5

      - name: Assert the lockfile is current with pyproject.toml
        run: uv lock --check

      - name: Sync (builds the vendored TurboVec core)
        run: uv sync

      - name: Assert the patched TurboVec core is present
        run: |
          uv run python - <<'PY'
          from lodedb import local_capability_report
          b = local_capability_report()["compact_backend"]
          assert b["available"], f"TurboVec backend unavailable: {b}"
          assert b["delta_persistence_available"], (
              "delta persistence missing — stock PyPI turbovec built instead of the patched core?"
          )
          assert b["reconstruction_available"], (
              "exact reconstruction missing — stock PyPI turbovec built instead of the patched core?"
          )
          print("patched TurboVec core OK:",
                {k: b.get(k) for k in ("version", "source_tag",
                                       "delta_persistence_available", "reconstruction_available")})
          PY

  native-core-benchmark:
    name: native-core benchmark artifact
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install OpenBLAS (Linux CBLAS provider for the vendored TurboVec crate)
        run: sudo apt-get update && sudo apt-get install -y libopenblas-dev

      - uses: dtolnay/rust-toolchain@stable
      - uses: astral-sh/setup-uv@v5

      - name: Sync (base runtime + dev)
        run: uv sync --extra dev

      - name: Build release native extension for benchmark
        run: cargo build --release --manifest-path third_party/turbovec/turbovec-python/Cargo.toml

      - name: Run Rust-vs-Python native-core benchmark
        env:
          LODEDB_NATIVE_CORE_EXTENSION_PATH: third_party/turbovec/target/release/lib_turbovec.so
        run: |
          uv run python -m benchmarks.native_migration.rust_vs_python \
            --documents 2000 --queries 200 --dim 64 \
            --output benchmarks/native_migration/results/rust_vs_python_ci.json
          uv run python - <<'PY'
          import json
          from pathlib import Path

          payload = json.loads(Path("benchmarks/native_migration/results/rust_vs_python_ci.json").read_text())
          summary = payload["pass_fail_summary"]
          if not summary["passed"]:
              raise SystemExit(f"native-core benchmark gates failed: {summary['failures']}")
          PY

      - uses: actions/upload-artifact@v4
        with:
          name: native-core-rust-vs-python-benchmark
          path: benchmarks/native_migration/results/rust_vs_python_ci.json
