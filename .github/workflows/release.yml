name: release

# On a version tag (vX.Y.Z): build the sdist + native abi3 wheels (Linux / macOS / Windows)
# plus the Swift/iOS XCFramework, publish Python artifacts to PyPI via Trusted Publishing
# (OIDC, no stored token), and attach all artifacts to a GitHub Release. The patched TurboVec
# Rust core is bundled into the lodedb wheel (see pyproject [tool.maturin]), so `pip install
# lodedb` resolves the patched core with nothing to compile and no extra dependency. Release
# wheels must also satisfy the base-runtime contract: only numpy / typer / PyYAML install from
# the bare wheel metadata (the embedding runtimes are the opt-in [embeddings]/[torch] extras),
# while `import lodedb` keeps any installed embedding runtime lazy.
#
# One-time setup before the first publish: configure a PyPI Trusted Publisher for project
# `lodedb` (owner: this repo, workflow: release.yml, environment: pypi). Until that exists the
# publish job fails closed and nothing is uploaded; the build jobs still produce artifacts.
#
# Cut a release: bump `version` in pyproject.toml + __version__ in src/lodedb/__init__.py to
# match, then `git tag vX.Y.Z && git push --tags`. `workflow_dispatch` builds artifacts only
# (it does not publish).

on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  version-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: pyproject version == __init__ __version__ (== tag, on a tag)
        run: |
          py=$(grep -m1 '^version = ' pyproject.toml | sed -E 's/.*"([^"]+)".*/\1/')
          init=$(grep -m1 '^__version__' src/lodedb/__init__.py | sed -E 's/.*"([^"]+)".*/\1/')
          echo "pyproject=$py  __init__=$init  ref=${GITHUB_REF_NAME}"
          test "$py" = "$init" || { echo "::error::pyproject version ($py) != __init__ __version__ ($init)"; exit 1; }
          if [ "$GITHUB_REF_TYPE" = "tag" ]; then
            test "v$py" = "$GITHUB_REF_NAME" || { echo "::error::tag $GITHUB_REF_NAME != v$py"; exit 1; }
          fi

  wheels:
    needs: version-check
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, target: x86_64 }
          - { os: macos-14, target: aarch64 }
          # x86_64 macOS is cross-compiled on the arm64 runner: GitHub's Intel
          # `macos-13` runners are being retired and can queue indefinitely.
          - { os: macos-14, target: x86_64 }
          - { os: windows-latest, target: x64 }
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30 # fail fast instead of hanging on an unavailable runner
    steps:
      - uses: actions/checkout@v4
      - name: Build abi3 wheel (maturin)
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist
          # manylinux_2_28; auditwheel bundles the OpenBLAS the crate links into the wheel.
          manylinux: "2_28"
          before-script-linux: |
            # CBLAS provider for the vendored TurboVec crate (Linux only; no-op elsewhere).
            dnf install -y epel-release || true
            dnf install -y openblas-devel || yum install -y openblas-devel
      - name: Smoke install wheel and base runtime contract
        if: ${{ runner.os != 'macOS' || matrix.target != 'x86_64' }}
        shell: bash
        run: |
          python -m venv .wheel-smoke
          if [ "$RUNNER_OS" = "Windows" ]; then
            PY=".wheel-smoke/Scripts/python.exe"
          else
            PY=".wheel-smoke/bin/python"
          fi
          "$PY" -m pip install --upgrade pip
          "$PY" -m pip install dist/*.whl
          "$PY" - <<'PY'
          import importlib.util
          import sys

          import lodedb

          loaded = {name.split(".", 1)[0] for name in sys.modules}
          eager_forbidden = {
              "onnxruntime",
              "transformers",
              "sentence_transformers",
              "torch",
              "sklearn",
              "faiss",
              "modal",
              "mteb",
              "datasets",
              "matplotlib",
          }
          eager = sorted(loaded & eager_forbidden)
          if eager:
              raise SystemExit(f"wheel import eagerly loaded heavy runtime modules: {eager}")

          # The bare wheel installs the slim base (vector store only); the embedding runtimes
          # are the opt-in [embeddings]/[torch] extras, so they are not expected here.
          required = {
              "numpy": "numpy",
              "typer": "typer",
              "pyyaml": "yaml",
          }
          missing = [name for name, module in required.items() if importlib.util.find_spec(module) is None]
          if missing:
              raise SystemExit(f"missing base runtime dependencies from wheel install: {missing}")

          assert lodedb.__version__
          PY
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.target }}
          path: dist/*.whl

  sdist:
    needs: version-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  swift-xcframework:
    needs: version-check
    runs-on: macos-14
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,aarch64-apple-ios,aarch64-apple-ios-sim
      - name: Build Swift/iOS XCFramework
        env:
          LODEDB_XCFRAMEWORK_TARGETS: aarch64-apple-darwin aarch64-apple-ios aarch64-apple-ios-sim
          LODEDB_XCFRAMEWORK_REQUIRE_ALL: "1"
        run: swift/LodeDBCore/scripts/package_xcframework.sh
      - name: Archive Swift/iOS XCFramework
        run: |
          mkdir -p dist
          ditto -c -k --keepParent swift/LodeDBCore/Artifacts/LodeDBCoreFFI.xcframework dist/LodeDBCoreFFI.xcframework.zip
      - name: Compute XCFramework checksum for SwiftPM remote binary target
        run: |
          # External SwiftPM consumers point .binaryTarget(url:checksum:) at the
          # uploaded zip; this records the matching checksum alongside the asset.
          CHECKSUM=$(swift package --package-path swift/LodeDBCore compute-checksum "$PWD/dist/LodeDBCoreFFI.xcframework.zip")
          echo "$CHECKSUM" | tee dist/LodeDBCoreFFI.xcframework.zip.checksum
          echo "LodeDBCoreFFI.xcframework.zip SwiftPM checksum: $CHECKSUM"
      - uses: actions/upload-artifact@v4
        with:
          name: swift-xcframework
          path: |
            dist/LodeDBCoreFFI.xcframework.zip
            dist/LodeDBCoreFFI.xcframework.zip.checksum

  publish:
    # Publish on a tag push once the Python artifacts (wheels + sdist) are built;
    # workflow_dispatch stops after the build jobs above. The Swift/iOS xcframework
    # is still awaited and attached to the GitHub Release when it builds, but it does
    # not gate the PyPI publish, so an iOS-toolchain failure never blocks a Python
    # release.
    if: >-
      !cancelled()
      && github.event_name == 'push'
      && startsWith(github.ref, 'refs/tags/v')
      && needs.wheels.result == 'success'
      && needs.sdist.result == 'success'
    needs: [wheels, sdist, swift-xcframework]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # PyPI Trusted Publishing (OIDC)
      contents: write # create the GitHub Release
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Stage Python distributions for PyPI
        # PyPI only accepts Python distributions; keep the Swift xcframework (and any
        # other non-Python release asset) out of the upload directory so twine does
        # not try to validate them.
        run: |
          mkdir -p pypi-dist
          mv dist/*.whl dist/*.tar.gz pypi-dist/
      - name: Publish to PyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: pypi-dist
      - name: Create GitHub Release with artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          # Python distributions plus any extra assets (the Swift xcframework when built).
          shopt -s nullglob
          gh release create "$GITHUB_REF_NAME" pypi-dist/* dist/* --generate-notes --verify-tag

  swift-package-publish:
    # Publishes the standalone `swift-lodedb` SwiftPM package: the Swift sources plus a
    # Package.swift whose binaryTarget is pinned to this release's xcframework asset and
    # checksum, committed and tagged in the package repo. Consumers then depend on
    # `.package(url: "https://github.com/Egoist-Machines/swift-lodedb", from: "x.y.z")`.
    #
    # Skips cleanly when SWIFT_PACKAGE_DEPLOY_TOKEN (a token with push access to the
    # package repo) is not configured, so it never blocks a release.
    needs: [publish, swift-xcframework]
    if: >-
      !cancelled()
      && github.event_name == 'push'
      && startsWith(github.ref, 'refs/tags/v')
      && needs.publish.result == 'success'
      && needs.swift-xcframework.result == 'success'
    runs-on: ubuntu-latest
    env:
      DEPLOY_TOKEN: ${{ secrets.SWIFT_PACKAGE_DEPLOY_TOKEN }}
      PACKAGE_REPO: Egoist-Machines/swift-lodedb
    steps:
      - name: Skip when no deploy token is configured
        if: env.DEPLOY_TOKEN == ''
        run: echo "SWIFT_PACKAGE_DEPLOY_TOKEN is not set; skipping the swift-lodedb publish."

      - uses: actions/checkout@v4
        if: env.DEPLOY_TOKEN != ''

      - name: Fetch the xcframework checksum
        if: env.DEPLOY_TOKEN != ''
        uses: actions/download-artifact@v4
        with:
          name: swift-xcframework
          path: dist

      - name: Assemble and push the swift-lodedb package
        if: env.DEPLOY_TOKEN != ''
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          # SwiftPM resolves strict SemVer only, so publish X.Y.Z releases and skip
          # non-SemVer tags (e.g. a PEP 440 pre-release like 1.1.0rc1).
          if ! printf '%s' "$version" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Tag ${GITHUB_REF_NAME} is not a strict vX.Y.Z release; skipping swift-lodedb publish."
            exit 0
          fi
          url="https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/LodeDBCoreFFI.xcframework.zip"
          checksum="$(cat dist/LodeDBCoreFFI.xcframework.zip.checksum)"
          git clone "https://x-access-token:${DEPLOY_TOKEN}@github.com/${PACKAGE_REPO}.git" pkg
          # Reset the package repo's tracked content (keep .git) so removed source files
          # do not linger; an empty repo has nothing to check out or remove.
          ( cd pkg && { git checkout main 2>/dev/null || git checkout -b main; } && { git rm -rfq . 2>/dev/null || true; } )
          bash swift/LodeDBCore/scripts/publish_swift_package.sh pkg "$version" "$url" "$checksum"
          cd pkg
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          # Idempotent commit/tag so a rerun (including after a partial push) recovers:
          # commit only when content changed, and create the tag only if missing, failing
          # loudly if it already points at a different commit (never move a published tag).
          if git diff --cached --quiet; then
            echo "No package changes; reusing the current HEAD."
          else
            git commit -m "release: LodeDBCore ${version}"
          fi
          if git rev-parse -q --verify "refs/tags/v${version}" >/dev/null; then
            test "$(git rev-list -n1 "v${version}")" = "$(git rev-parse HEAD)"
          else
            git tag -a "v${version}" -m "LodeDBCore ${version}"
          fi
          git push origin main
          git push origin "v${version}"
